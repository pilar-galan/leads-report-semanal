name: Daily Leads Report → Discord

on:
  schedule:
    # Job 1: genera el dashboard a las 8:30h España (06:30 UTC verano)
    - cron: '30 6 * * 1-5'
    # Job 2: envía aviso a Discord a las 9:00h España (07:00 UTC verano)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: genera y publica el dashboard ──────────────────────────────────
  generate-dashboard:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 6 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar dashboard con datos reales de HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python3 generate_dashboard.py

      - name: Publicar dashboard actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_diario.html
          if git diff --staged --quiet; then
            echo "Sin cambios en el dashboard"
          else
            git commit -m "chore: actualización diaria del dashboard (datos HubSpot)"
            git push
          fi

  # ── Job 2: envía aviso a Discord — solo cron automático, nunca manual ─────
  send-discord:
    if: github.event.schedule == '0 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Enviar aviso a Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_THREAD_ID: ${{ secrets.DISCORD_THREAD_ID }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from datetime import datetime, timedelta, timezone

          webhook    = os.environ['DISCORD_WEBHOOK_URL']
          thread_id  = os.environ['DISCORD_THREAD_ID']
          dashboard_url = 'https://pilar-galan.github.io/leads-report-diario/dashboard_diario.html'

          now = datetime.now(timezone.utc) + timedelta(hours=2)
          MESES = ['enero','febrero','marzo','abril','mayo','junio','julio',
                   'agosto','septiembre','octubre','noviembre','diciembre']
          hoy = f"{now.day} de {MESES[now.month-1]}"

          message = {"content": f"📊 **Informe diario GuruSup** · {hoy}\n{dashboard_url}"}
          url = f"{webhook}?thread_id={thread_id}"
          r = requests.post(url, json=message)
          print("Status:", r.status_code, r.text[:200])
          PYEOF
