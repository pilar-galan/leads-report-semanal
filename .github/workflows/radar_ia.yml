name: GuruSup Radar IA

on:
  schedule:
    - cron: '0 7 * * *'   # 9:00h España (CEST, UTC+2) — en invierno serán las 8h
  workflow_dispatch:       # Permite lanzarlo manualmente desde GitHub para hacer pruebas

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Ejecutar Radar IA
        env:
          DISCORD_WEBHOOK:   ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python radar_ia.py
