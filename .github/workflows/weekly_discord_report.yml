name: Weekly Leads Report → Discord

on:
  schedule:
    - cron: '0 6 * * 1'   # Lunes 08:00 hora España (UTC+2 verano)
  workflow_dispatch:        # También ejecutable manualmente

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send to Discord thread
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_THREAD_ID: ${{ secrets.DISCORD_THREAD_ID }}
          REPORT_URL: https://pilar-galan.github.io/leads-report-semanal/informe_leads_semanal.html
          DASHBOARD_URL: https://pilar-galan.github.io/leads-report-semanal/dashboard_ejecutivo.html
        run: |
          python3 << 'PYEOF'
          import os, requests, json
          from datetime import date, timedelta

          webhook = os.environ['DISCORD_WEBHOOK_URL']
          thread_id = os.environ['DISCORD_THREAD_ID']
          report_url = os.environ['REPORT_URL']
          dashboard_url = os.environ['DASHBOARD_URL']

          today = date.today()
          monday = today - timedelta(days=today.weekday())
          last_monday = monday - timedelta(days=7)
          week = f"{last_monday.strftime('%d')}-{monday.strftime('%d %b %Y')}"

          message = {
              "embeds": [{
                  "title": "📊 Seguimiento Semanal de Oportunidades · GuruSup",
                  "description": f"**Semana {week}**",
                  "color": 0xFF6B5B,
                  "fields": [
                      {"name": "🔢 Leads totales",       "value": "**116** · ↓18% vs anterior", "inline": True},
                      {"name": "✅ Ya gestionados",       "value": "**31** · 27% del total",     "inline": True},
                      {"name": "🎯 Oportunidades activas","value": "**10** · €17,300 pipeline",  "inline": True},
                      {"name": "🚀 Freemiums nuevos",     "value": "**3** · TBF · Planeta · Avantio", "inline": True},
                      {"name": "🚨 Alertas sin revisar",  "value": "RENFE · PC Componentes",     "inline": True},
                      {"name": "📈 Canal top",            "value": "SEM 60% conversión",         "inline": True},
                  ],
                  "footer": {"text": "GuruSup · Leads Report Semanal"},
              }],
              "content": f"Ver informe completo → {report_url}"
          }

          url = f"{webhook}?thread_id={thread_id}"
          r = requests.post(url, json=message)
          print("Status:", r.status_code, r.text[:200])
          PYEOF
