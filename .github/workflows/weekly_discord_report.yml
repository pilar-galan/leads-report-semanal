name: Weekly Leads Report → Discord

on:
  schedule:
    - cron: '0 6 * * 1'   # Lunes 08:00 hora España (UTC+2 verano)
  workflow_dispatch:        # También ejecutable manualmente

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Get current week dates
        id: dates
        run: |
          python3 -c "
          from datetime import date, timedelta
          today = date.today()
          monday = today - timedelta(days=today.weekday())
          last_monday = monday - timedelta(days=7)
          print(f'WEEK_START={last_monday.strftime(\"%d %b\")}')
          print(f'WEEK_END={monday.strftime(\"%d %b %Y\")}')
          " >> $GITHUB_OUTPUT

      - name: Send to Discord thread
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_THREAD_ID: ${{ secrets.DISCORD_THREAD_ID }}
          REPORT_URL: https://pilar-galan.github.io/gurusup-radar-ia/informe_leads_semanal.html
          DASHBOARD_URL: https://pilar-galan.github.io/gurusup-radar-ia/dashboard_ejecutivo.html
        run: |
          python3 << 'PYEOF'
          import os, requests, json

          webhook = os.environ['DISCORD_WEBHOOK_URL']
          thread_id = os.environ['DISCORD_THREAD_ID']
          report_url = os.environ['REPORT_URL']
          dashboard_url = os.environ['DASHBOARD_URL']

          url = f"{webhook}?thread_id={thread_id}"

          # 1. Enviar imagen KPI
          with open('kpi_preview.png', 'rb') as f:
              r = requests.post(url, files={'file': ('kpi_preview.png', f, 'image/png')},
                                data={'payload_json': json.dumps({'content': ''})})
          print("Image:", r.status_code)

          # 2. Enviar mensaje con link
          message = {
              "content": (
                  "📊 **Seguimiento Semanal de Oportunidades · GuruSup**\n"
                  f"🔗 Informe completo → {report_url}\n"
                  f"🎯 Dashboard ejecutivo → {dashboard_url}"
              )
          }
          r2 = requests.post(url, json=message)
          print("Message:", r2.status_code)
          PYEOF
